credentials = ["github_token:proggy-al", "git_ssh:default"]
schedule = "*/15 * * * *"

[[webhooks]]
type = "github"
# No org/repos filter - accept webhooks from any repository
org = ["Action-Llama"]
events = ["issues"]
actions = ["labeled"]
labels = ["agent"]

[params]
# Organization to monitor during scheduled runs (webhook runs use repo from trigger)
org = "Action-Llama"
triggerLabel = "agent"
assignee = "asselstine"