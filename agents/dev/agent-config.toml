credentials = ["github_token:proggy-al", "git_ssh:default"]
schedule = "0 * * * *"
scale = 4
# Need 30 min timeout just in case
timeout = 1800

[model]
provider = "anthropic"
model = "claude-sonnet-4-20250514"
thinkingLevel = "medium"
authType = "api_key"

[[webhooks]]
source = "github"
orgs = ["Action-Llama"]
events = ["issues"]
actions = ["labeled"]
labels = ["ready-for-dev"]
author = "asselstine"

[params]
# Organization to monitor during scheduled runs (webhook runs use repo from trigger)
org = "Action-Llama"
triggerLabel = "ready-for-dev"
author = "asselstine"
