name: Update action-llama

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check for new version
        id: check
        run: |
          CURRENT=$(node -e "const lock = require('./package-lock.json'); console.log(lock.packages['node_modules/@action-llama/action-llama'].version)")
          LATEST=$(npm view @action-llama/action-llama@next version)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$LATEST" ]; then
            echo "updated=true" >> "$GITHUB_OUTPUT"
          else
            echo "updated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update dependency
        if: steps.check.outputs.updated == 'true'
        run: npm install @action-llama/action-llama@next

      - name: Commit and push
        if: steps.check.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: update action-llama to v${{ steps.check.outputs.latest }}"
          git push
