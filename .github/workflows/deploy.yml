name: Deploy

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [deploy]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (validate setup without deploying)'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up SSH key
        run: |
          if [ "$DRY_RUN" = "true" ] && [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "🧪 DRY RUN: Skipping SSH key setup (secret not configured)"
            mkdir -p ~/.ssh
            echo "# Dry run - SSH key would be configured here" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
          else
            mkdir -p ~/.ssh
            echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
          fi

      - name: Set up environment config
        run: |
          if [ "$DRY_RUN" = "true" ] && [ -z "${{ secrets.DEPLOY_ENV_TOML }}" ]; then
            echo "🧪 DRY RUN: Skipping environment config setup (secret not configured)"
            mkdir -p ~/.action-llama/environments
            echo "# Dry run - environment config would be configured here" > ~/.action-llama/environments/prod.toml
          else
            mkdir -p ~/.action-llama/environments
            echo '${{ secrets.DEPLOY_ENV_TOML }}' > ~/.action-llama/environments/prod.toml
          fi

      - name: Validate required secrets
        run: |
          echo "=== Validating required secrets ==="
          echo "ℹ️  See README.md for detailed setup instructions"
          echo ""
          
          MISSING_SECRETS=""
          
          # Check if ANTHROPIC_API_KEY is set and not empty
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "❌ ERROR: ANTHROPIC_API_KEY repository secret is not set or is empty"
            MISSING_SECRETS="$MISSING_SECRETS ANTHROPIC_API_KEY"
          else
            echo "✅ ANTHROPIC_API_KEY secret is set"
          fi
          
          # Check if DEPLOY_SSH_KEY is set  
          if [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "❌ ERROR: DEPLOY_SSH_KEY repository secret is not set or is empty"
            MISSING_SECRETS="$MISSING_SECRETS DEPLOY_SSH_KEY"
          else
            echo "✅ DEPLOY_SSH_KEY secret is set"
          fi
          
          # Check if DEPLOY_ENV_TOML is set
          if [ -z "${{ secrets.DEPLOY_ENV_TOML }}" ]; then
            echo "❌ ERROR: DEPLOY_ENV_TOML repository secret is not set or is empty"
            MISSING_SECRETS="$MISSING_SECRETS DEPLOY_ENV_TOML"
          else
            echo "✅ DEPLOY_ENV_TOML secret is set"
          fi
          
          # Check if GITHUB_TOKEN is available
          if [ -z "${{ secrets.GITHUB_TOKEN }}" ]; then
            echo "❌ ERROR: GITHUB_TOKEN is not available"
            MISSING_SECRETS="$MISSING_SECRETS GITHUB_TOKEN"
          else
            echo "✅ GITHUB_TOKEN is available"
          fi
          
          # If any secrets are missing, provide helpful guidance
          if [ -n "$MISSING_SECRETS" ]; then
            echo ""
            echo "🔧 SETUP REQUIRED:"
            echo "The following repository secrets need to be configured:"
            for secret in $MISSING_SECRETS; do
              echo "  • $secret"
              case $secret in
                "ANTHROPIC_API_KEY")
                  echo "    ├─ Get your API key from: https://console.anthropic.com/account/keys"
                  echo "    └─ It should start with 'sk-ant-'"
                  ;;
                "DEPLOY_SSH_KEY")
                  echo "    ├─ Generate with: ssh-keygen -t rsa -b 4096 -C 'deploy@action-llama.com'"
                  echo "    └─ See: https://docs.github.com/en/authentication/connecting-to-github-with-ssh"
                  ;;
                "DEPLOY_ENV_TOML")
                  echo "    └─ Production environment configuration (TOML format)"
                  ;;
              esac
            done
            echo ""
            echo "🚀 QUICK SETUP:"
            echo "   Run the interactive setup assistant:"
            echo "   GITHUB_TOKEN=your_token npm run setup"
            echo ""
            echo "📋 MANUAL SETUP:"
            echo "1. Repository administrators should go to:"
            echo "   https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo "2. Click 'New repository secret'"
            echo "3. Add each missing secret listed above"
            echo "4. Re-run this workflow after secrets are configured"
            echo ""
            echo "📚 DETAILED GUIDES:"
            echo "   • SETUP-CHECKLIST.md - Step-by-step setup guide"
            echo "   • README.md - Complete setup documentation"
            echo ""
            echo "🔍 VALIDATION TOOLS:"
            echo "   • Test setup: npm run test-workflow"
            echo "   • Validate secrets: GITHUB_TOKEN=your_token npm run validate-secrets"
            echo "   • Interactive setup: GITHUB_TOKEN=your_token npm run setup"
            echo ""
            echo "💡 DRY RUN MODE:"
            echo "   To test workflow components without deploying:"
            echo "   • Add 'dry-run' to your commit message, OR"
            echo "   • Set workflow input 'dry_run' to true when running manually"
            echo ""
            echo "⚠️  This is a configuration issue that requires repository admin access."
            echo "   It cannot be fixed through code changes alone, but the tools above can help!"
            
            # Enable dry-run mode if requested
            if [[ "${{ github.event.head_commit.message }}" =~ dry-run ]] || [[ "${{ inputs.dry_run }}" == "true" ]]; then
              echo ""
              echo "🧪 DRY RUN MODE ENABLED - Continuing validation without actual deployment"
              echo "DRY_RUN=true" >> $GITHUB_ENV
            else
              exit 1
            fi
          fi
          
          echo ""
          echo "✅ All required secrets are configured and ready for deployment!"

      - name: Configure credentials for action-llama
        run: |
          # Set up the credential directory with multiple potential paths
          mkdir -p ~/.action-llama/credentials
          mkdir -p /tmp/.action-llama/credentials
          mkdir -p "$(pwd)/.action-llama/credentials"
          
          # Function to create credentials in a specific directory
          create_credentials() {
            local cred_dir="$1"
            echo "Creating credentials in: $cred_dir"
            
            # In dry-run mode with missing secrets, create placeholder files
            if [ "$DRY_RUN" = "true" ]; then
              if [ -n "${{ secrets.GITHUB_TOKEN }}" ]; then
                printf '{"type":"github_token","token":"%s"}\n' "${{ secrets.GITHUB_TOKEN }}" > "${cred_dir}/github_token.json"
              else
                echo '{"type":"github_token","token":"dry-run-placeholder"}' > "${cred_dir}/github_token.json"
              fi
              
              if [ -n "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
                GIT_EMAIL="${{ vars.GIT_EMAIL }}"
                GIT_NAME="${{ vars.GIT_NAME }}"
                jq -n \
                  --arg key "${{ secrets.DEPLOY_SSH_KEY }}" \
                  --arg email "${GIT_EMAIL:-deploy@action-llama.com}" \
                  --arg name "${GIT_NAME:-Action Llama Deploy}" \
                  '{"type":"git_ssh","privateKey":$key,"email":$email,"name":$name}' \
                  > "${cred_dir}/git_ssh.json"
              else
                echo '{"type":"git_ssh","privateKey":"dry-run-placeholder","email":"deploy@action-llama.com","name":"Action Llama Deploy"}' > "${cred_dir}/git_ssh.json"
              fi
              
              if [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
                printf '{"type":"anthropic_key","key":"%s"}\n' "${{ secrets.ANTHROPIC_API_KEY }}" > "${cred_dir}/anthropic_key.json"
              else
                echo '{"type":"anthropic_key","key":"dry-run-placeholder"}' > "${cred_dir}/anthropic_key.json"
              fi
            else
              # Normal credential setup
              # Configure GitHub token
              printf '{"type":"github_token","token":"%s"}\n' "${{ secrets.GITHUB_TOKEN }}" > "${cred_dir}/github_token.json"
              
              # Configure SSH/Git credentials - use the deploy key  
              GIT_EMAIL="${{ vars.GIT_EMAIL }}"
              GIT_NAME="${{ vars.GIT_NAME }}"
              jq -n \
                --arg key "${{ secrets.DEPLOY_SSH_KEY }}" \
                --arg email "${GIT_EMAIL:-deploy@action-llama.com}" \
                --arg name "${GIT_NAME:-Action Llama Deploy}" \
                '{"type":"git_ssh","privateKey":$key,"email":$email,"name":$name}' \
                > "${cred_dir}/git_ssh.json"
              
              # Configure Anthropic API key 
              printf '{"type":"anthropic_key","key":"%s"}\n' "${{ secrets.ANTHROPIC_API_KEY }}" > "${cred_dir}/anthropic_key.json"
            fi
            
            # Set proper permissions on all credential files
            chmod 600 "${cred_dir}"/*.json
            chmod 700 "${cred_dir}"
          }
          
          # Create credentials in the standard location
          create_credentials ~/.action-llama/credentials
          
          # Also create in alternative locations as fallbacks
          create_credentials /tmp/.action-llama/credentials
          create_credentials "$(pwd)/.action-llama/credentials"

      - name: Debug credentials and environment
        run: |
          echo "=== Environment info ==="
          echo "HOME: $HOME"
          echo "PWD: $PWD"
          echo "USER: $(whoami)"
          echo "SHELL: $SHELL"
          echo "PATH: $PATH"
          
          echo "=== Credential directory info ==="
          echo "Expected path: ~/.action-llama/credentials"
          echo "Resolved path: $HOME/.action-llama/credentials"
          
          if [ -d ~/.action-llama/credentials ]; then
            echo "Directory exists: YES"
            ls -la ~/.action-llama/credentials/
            
            echo "=== File permissions and content validation ==="
            for file in ~/.action-llama/credentials/*.json; do
              if [ -f "$file" ]; then
                echo "--- $(basename "$file") ---"
                echo "Permissions: $(ls -l "$file")"
                echo "Size: $(stat -c%s "$file") bytes"
                echo "Keys: $(jq -r 'keys | join(", ")' "$file" 2>/dev/null || echo "Invalid JSON")"
                echo "Valid JSON: $(jq . "$file" >/dev/null 2>&1 && echo "YES" || echo "NO")"
              fi
            done
          else
            echo "Directory exists: NO"
          fi
          
          echo "=== Test al CLI credential detection ==="
          echo "Running: npx al creds ls"
          npx al creds ls || echo "al creds ls failed with exit code $?"
          
          echo "=== Test al version ==="
          npx al --version
          
          echo "=== Test alternative credential paths ==="
          for path in "/tmp/.action-llama/credentials" "/home/runner/.action-llama/credentials" "$PWD/.action-llama/credentials"; do
            echo "Checking path: $path"
            if [ -d "$path" ]; then
              echo "  Exists: YES, files: $(ls -1 "$path" 2>/dev/null | wc -l)"
            else
              echo "  Exists: NO"
            fi
          done

      - name: Validate credentials before deploy
        run: |
          echo "=== Credential validation ==="
          
          # Test credential detection in standard location
          echo "Testing standard credential location..."
          if npx al creds ls; then
            echo "✅ al creds ls succeeded - credentials are readable"
          else
            echo "❌ al creds ls failed - trying alternative credential directories..."
            
            # Test with explicit credential directory options
            for cred_path in "/tmp/.action-llama/credentials" "$(pwd)/.action-llama/credentials"; do
              echo "Testing credential path: $cred_path"
              if [ -d "$cred_path" ]; then
                # Try with different approaches to specify credential directory
                ACTION_LLAMA_CREDS_DIR="$cred_path" npx al creds ls && echo "✅ Found working credential path: $cred_path" && break
              fi
            done
            
            # If credential files still don't work, we'll rely on environment variables
            echo "Setting up environment variables as credential fallback..."
            export AL_GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}"
            export AL_ANTHROPIC_KEY="${{ secrets.ANTHROPIC_API_KEY }}"
            
            echo "✅ Environment variables configured as credential fallback"
          fi

      - name: Deploy
        env:
          # Set environment variables as fallbacks for credentials
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AL_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AL_ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Ensure proper Git SSH setup
          GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key"
          # Try alternative credential directory paths
          ACTION_LLAMA_CREDS_DIR: ~/.action-llama/credentials
        run: |
          # Check if we're in dry-run mode
          if [ "$DRY_RUN" = "true" ]; then
            echo "🧪 DRY RUN MODE: Skipping actual deployment"
            echo "✅ Workflow validation completed successfully"
            echo ""
            echo "📋 What was validated:"
            echo "  • Workflow structure and dependencies"
            echo "  • SSH key setup process"
            echo "  • Environment configuration process"
            echo "  • Credential configuration process"
            echo ""
            echo "🔧 To complete setup:"
            echo "  1. Configure missing repository secrets"
            echo "  2. Re-run this workflow without dry-run mode"
            echo "  3. Verify deployment succeeds"
            exit 0
          fi
          
          echo "=== Final pre-deploy checks ==="
          echo "HOME: $HOME"
          echo "Current directory: $(pwd)"
          
          # Double-check that our secrets are actually populated
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "❌ FATAL: ANTHROPIC_API_KEY environment variable is empty"
            exit 1
          fi
          
          echo "✅ Required environment variables are set"
          
          # Try multiple approaches for credential detection
          echo "=== Final credential check ==="
          CREDS_FOUND=false
          
          # Method 1: Standard location
          if npx al creds ls >/dev/null 2>&1; then
            echo "✅ Credentials found in standard location"
            CREDS_FOUND=true
          else
            echo "❌ Standard credential location failed"
            
            # Method 2: Try alternative credential directories
            for cred_path in "/tmp/.action-llama/credentials" "$(pwd)/.action-llama/credentials"; do
              if [ -d "$cred_path" ]; then
                echo "Trying credential path: $cred_path"
                if ACTION_LLAMA_CREDS_DIR="$cred_path" npx al creds ls >/dev/null 2>&1; then
                  echo "✅ Credentials found at: $cred_path"
                  export ACTION_LLAMA_CREDS_DIR="$cred_path"
                  CREDS_FOUND=true
                  break
                fi
              fi
            done
          fi
          
          if [ "$CREDS_FOUND" = "false" ]; then
            echo "⚠️  Credential files not detected by al CLI, relying on environment variables"
            # Verify environment variables are set as fallback
            if [ -n "$AL_GITHUB_TOKEN" ] && [ -n "$AL_ANTHROPIC_KEY" ]; then
              echo "✅ Environment variable fallbacks are configured"
            else
              echo "❌ Neither credential files nor environment variables are working"
              echo "This deploy will likely fail, but attempting anyway for diagnostic purposes"
            fi
          fi
          
          echo "=== Starting deploy ==="
          # Try deploy with current credential configuration
          npx al push --env prod --headless || {
            echo "❌ Deploy failed with current credential setup"
            echo "=== Diagnostic information ==="
            echo "Credential directories checked:"
            for path in ~/.action-llama/credentials /tmp/.action-llama/credentials "$(pwd)/.action-llama/credentials"; do
              if [ -d "$path" ]; then
                echo "  $path: $(ls -1 "$path" | wc -l) files"
              else
                echo "  $path: not found"
              fi
            done
            echo "Environment variables:"
            echo "  GITHUB_TOKEN: $([ -n "$GITHUB_TOKEN" ] && echo "set" || echo "not set")"
            echo "  ANTHROPIC_API_KEY: $([ -n "$ANTHROPIC_API_KEY" ] && echo "set" || echo "not set")"
            echo "  AL_GITHUB_TOKEN: $([ -n "$AL_GITHUB_TOKEN" ] && echo "set" || echo "not set")" 
            echo "  AL_ANTHROPIC_KEY: $([ -n "$AL_ANTHROPIC_KEY" ] && echo "set" || echo "not set")"
            exit 1
          }
          
          echo "✅ Deploy completed successfully"
