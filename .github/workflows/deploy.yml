name: Deploy

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [deploy]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Set up environment config
        run: |
          mkdir -p ~/.action-llama/environments
          echo '${{ secrets.DEPLOY_ENV_TOML }}' > ~/.action-llama/environments/prod.toml

      - name: Configure credentials for action-llama
        run: |
          # Set up the credential directory
          mkdir -p ~/.action-llama/credentials
          
          # Configure GitHub token
          printf '{"type":"github_token","token":"%s"}\n' "${{ secrets.GITHUB_TOKEN }}" > ~/.action-llama/credentials/github_token.json
          
          # Configure SSH/Git credentials - use the deploy key  
          GIT_EMAIL="${{ vars.GIT_EMAIL }}"
          GIT_NAME="${{ vars.GIT_NAME }}"
          printf '{"type":"git_ssh","privateKey":"%s","email":"%s","name":"%s"}\n' "${{ secrets.DEPLOY_SSH_KEY }}" "${GIT_EMAIL:-deploy@action-llama.com}" "${GIT_NAME:-Action Llama Deploy}" > ~/.action-llama/credentials/git_ssh.json
          
          # Configure Anthropic API key 
          printf '{"type":"anthropic_key","key":"%s"}\n' "${{ secrets.ANTHROPIC_API_KEY }}" > ~/.action-llama/credentials/anthropic_key.json

      - name: Deploy
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ANTHROPIC_KEY: dummy
          GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=no"
        run: npx al push --env prod --headless
