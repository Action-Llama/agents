name: Deploy

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [deploy]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (validate setup without deploying)'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update Action Llama
        id: update-al
        run: |
          # Sleep briefly when triggered by repository_dispatch to allow npm propagation
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "Waiting for npm registry..."
            sleep 10
          fi

          CURRENT=$(node -p "require('./package.json').dependencies['@action-llama/action-llama']")
          CURRENT_VERSION="${CURRENT#^}"

          LATEST_NEXT=$(npm view @action-llama/action-llama@next version 2>/dev/null || echo "")
          LATEST_STABLE=$(npm view @action-llama/action-llama version)

          if [ -n "$LATEST_NEXT" ] && echo "$CURRENT_VERSION" | grep -q "^0\.1[0-9]"; then
            TARGET_VERSION="$LATEST_NEXT"
            TARGET_TAG="next"
          else
            TARGET_VERSION="$LATEST_STABLE"
            TARGET_TAG="latest"
          fi

          if [ "$CURRENT_VERSION" != "$TARGET_VERSION" ]; then
            echo "Updating @action-llama/action-llama from $CURRENT_VERSION to $TARGET_VERSION ($TARGET_TAG)"
            if [ "$TARGET_TAG" = "next" ]; then
              npm install @action-llama/action-llama@$TARGET_TAG
            else
              npm install @action-llama/action-llama@^$TARGET_VERSION
            fi
            echo "updated=true" >> $GITHUB_OUTPUT
            echo "version=$TARGET_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Action Llama is already up to date ($CURRENT_VERSION)"
            echo "updated=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated Action Llama
        if: steps.update-al.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: update action-llama to v${{ steps.update-al.outputs.version }}"
          git push origin main

      - name: Set up SSH key
        run: |
          if [ "$DRY_RUN" = "true" ] && [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "DRY RUN: Skipping SSH key setup (secret not configured)"
            mkdir -p ~/.ssh
            echo "# Dry run - SSH key would be configured here" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
          else
            mkdir -p ~/.ssh
            echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
          fi

      - name: Set up environment config
        run: |
          if [ "$DRY_RUN" = "true" ] && [ -z "${{ secrets.DEPLOY_ENV_TOML }}" ]; then
            echo "DRY RUN: Skipping environment config setup (secret not configured)"
            mkdir -p ~/.action-llama/environments
            echo "# Dry run - environment config would be configured here" > ~/.action-llama/environments/prod.toml
            echo "# Dry run - environment config would be configured here" > env.toml
          else
            mkdir -p ~/.action-llama/environments
            echo '${{ secrets.DEPLOY_ENV_TOML }}' > ~/.action-llama/environments/prod.toml
            echo '${{ secrets.DEPLOY_ENV_TOML }}' > env.toml
          fi

      - name: Validate required secrets
        run: |
          MISSING=""

          if [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "ERROR: DEPLOY_SSH_KEY is not set"
            MISSING="$MISSING DEPLOY_SSH_KEY"
          else
            echo "DEPLOY_SSH_KEY is set"
          fi

          if [ -z "${{ secrets.DEPLOY_ENV_TOML }}" ]; then
            echo "ERROR: DEPLOY_ENV_TOML is not set"
            MISSING="$MISSING DEPLOY_ENV_TOML"
          else
            echo "DEPLOY_ENV_TOML is set"
          fi

          if [ -n "$MISSING" ]; then
            if [[ "${{ github.event.head_commit.message }}" =~ dry-run ]] || [[ "${{ inputs.dry_run }}" == "true" ]]; then
              echo "DRY RUN MODE: continuing without required secrets"
              echo "DRY_RUN=true" >> $GITHUB_ENV
            else
              echo "DEPLOYMENT BLOCKED: Missing required secrets:$MISSING"
              echo "Add them at: https://github.com/${{ github.repository }}/settings/secrets/actions"
              exit 1
            fi
          fi

      - name: Set up host-user runtime prerequisites
        run: |
          # al push validates host-user runtime requirements locally.
          # Create the system user on the CI runner to pass validation.
          AGENT_USER="al-agent"
          RUNNER_USER=$(whoami)

          echo "Creating system user '$AGENT_USER' for host-user runtime validation..."
          sudo useradd -r -m -s /usr/sbin/nologin "$AGENT_USER"

          echo "Configuring sudoers for $RUNNER_USER -> $AGENT_USER..."
          echo "$RUNNER_USER ALL=($AGENT_USER) NOPASSWD: ALL" | sudo tee "/etc/sudoers.d/al-$AGENT_USER"
          sudo chmod 0440 "/etc/sudoers.d/al-$AGENT_USER"

      - name: Deploy
        env:
          GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key"
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN MODE: Skipping actual deployment"
            exit 0
          fi

          if [ ! -f env.toml ]; then
            echo "ERROR: env.toml not found"
            exit 1
          fi

          # Deploy project files only. Credentials are managed on the server
          # via manual `al push` and must not be overwritten by CI.
          echo "Running: npx al push --env prod --headless --files-only"
          set -o pipefail
          if npx al push --env prod --headless --files-only 2>&1 | tee deploy.log; then
            echo "Deploy completed successfully"
          else
            EXIT_CODE=$?
            echo "Deploy failed with exit code: $EXIT_CODE"
            cat deploy.log || true
            exit 1
          fi
